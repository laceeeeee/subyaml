#  ---------说明---------
#  bettbox 配置覆写脚本
#  基于 mihomo 内核
#  参考 AIsouler/MyClash 配置风格转换
#  保留原始 DNS 分流逻辑与规则功能
#  ---------------------



# --- 基础全局配置 ---

allow-lan: true
ipv6: false
bind-address: '*'
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict
external-controller: '[::]:9090'
external-ui: ui
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'

profile:
  store-selected: true
  store-fake-ip: true

# --- DNS 配置（保留原 DNS 分流逻辑）---

dns:
  enable: true
  ipv6: false
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16

  # 0. 用于解析下面所有带域名的 DOH 的 DNS
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  # 1. 明确国内域名、apple，走阿里/腾讯
  nameserver-policy:
    "geosite:cn,private,apple":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "*.linux.do": "https://xxx.ddd.oaifree.com/query-dns"
    "linux.do": "https://xxx.ddd.oaifree.com/query-dns"

  # 2. 全局默认 DNS 换成国外，并加上 #RULES 强制走代理（分流规则）
  nameserver:
    - "https://dns.cloudflare.com/dns-query#RULES"
    - "https://dns.google/dns-query#RULES"

  # 3. 用于解析节点域名的 DNS
  proxy-server-nameserver:
    - 119.29.29.29
    - 223.5.5.5

  # 4. 解析到最后发现是直连则走此 DNS
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  direct-nameserver-follow-policy: true

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "*.msftncsi.com"
    - "www.msftconnecttest.com"

# --- Hosts 解析（加速 DOH 解析 + 屏蔽 PCDN）---

hosts:
  'dns.alidns.com': ['223.5.5.5', '223.6.6.6']
  'doh.pub': ['1.12.12.12', '120.53.53.53']
  'dns.cloudflare.com': ['1.1.1.1', '1.0.0.1']
  'dns.google': ['8.8.8.8', '8.8.4.4']
  'services.googleapis.cn': ['services.googleapis.com']
  '+.mcdn.bilivideo.com': ['0.0.0.0']
  '+.mcdn.bilivideo.cn': ['0.0.0.0']

# --- NTP 时间同步 ---

ntp:
  enable: true
  server: ntp.aliyun.com
  port: 123
  interval: 30

# --- TUN 虚拟网卡（系统级代理）---

tun:
  enable: true
  stack: system
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'

# --- 直连节点 ---

proxies:
  - { name: '🇨🇳 直连 | IPv4优先', type: direct, ip-version: ipv4-prefer }
  - { name: '🇨🇳 直连 | IPv6优先', type: direct, ip-version: ipv6-prefer }
  - { name: '🇨🇳 直连 | 双栈', type: direct }

# --- 规则集 (Rule Providers) ---

rule_providers_common:
  rule_providers_domain: &rule_providers_domain
    type: http
    interval: 86400
    behavior: domain
  rule_providers_ip: &rule_providers_ip
    type: http
    interval: 86400
    behavior: ipcidr
  rule_providers_classical: &rule_providers_classical
    type: http
    interval: 86400
    behavior: classical

rule-providers:
  Telegram:
    <<: *rule_providers_classical
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Telegram/Telegram_No_Resolve.yaml"
    path: ./ruleset/Telegram.yaml

  Apple:
    <<: *rule_providers_classical
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Providers/Apple.yaml"
    path: ./ruleset/Apple.yaml

  AllProxy:
    <<: *rule_providers_domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Global/Global_Domain.yaml"
    path: ./ruleset/AllProxy.yaml

# --- 策略组通用配置 ---

group_common: &group_common
  group_common_select: &group_common_select
    type: select
    interval: 600
    timeout: 3000
    lazy: true
    url: 'https://g.cn/generate_204'

  group_common_auto: &group_common_auto
    type: url-test
    interval: 600
    timeout: 3000
    lazy: true
    tolerance: 100
    include-all: true
    exclude-type: 'DIRECT'
    url: 'https://g.cn/generate_204'
    hidden: true

  group_common_load: &group_common_load
    type: load-balance
    interval: 600
    timeout: 3000
    lazy: true
    strategy: sticky-sessions
    include-all: true
    exclude-type: 'DIRECT'
    url: 'https://g.cn/generate_204'
    hidden: true

# --- 地区过滤器 ---

group_filter: &group_filter
  HK_filter: &HK_filter { filter: '🇭🇰|港|HK|[Hh]ong\s*[Kk]ong' }
  JP_filter: &JP_filter { filter: '🇯🇵|日本|JP|[Jj]apan' }
  US_filter: &US_filter { filter: '🇺🇸|美|US|[Aa]merica|[Uu]nited\s*[Ss]tates' }
  SG_filter: &SG_filter { filter: '🇸🇬|新加坡|狮城|SG|[Ss]ingapore' }
  TW_filter: &TW_filter { filter: '🇹🇼|台湾|TW|[Tt]aiwan' }
  exclude_filter: &exclude_filter
    exclude-filter: '港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|台湾|TW|🇹🇼'
    exclude-type: 'DIRECT'

# --- 策略组 (Proxy Groups) ---

proxy-groups:
  - name: '🚀 节点选择'
    <<: *group_common_select
    proxies:
      [
        '自动选择',
        '负载均衡',
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '其他节点',
      ]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png'

  - name: '自动选择'
    <<: *group_common_auto

  - name: '负载均衡'
    <<: *group_common_load

  - name: '🎯 全球直连'
    <<: *group_common_select
    proxies:
      [
        '🇨🇳 直连 | IPv4优先',
        '🇨🇳 直连 | IPv6优先',
        '🇨🇳 直连 | 双栈',
        '🚀 节点选择',
      ]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China_Map.png'

  - name: '📲 电报消息'
    <<: *group_common_select
    proxies:
      [
        '🚀 节点选择',
        '自动选择',
        '负载均衡',
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '其他节点',
        '🎯 全球直连',
      ]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png'

  - name: '🐧 Linux.do'
    <<: *group_common_select
    proxies:
      [
        '🚀 节点选择',
        '自动选择',
        '负载均衡',
        '香港',
        '日本',
        '美国',
        '新加坡',
        '台湾省',
        '其他节点',
        '🎯 全球直连',
      ]
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Star.png'

  # 地区策略组
  - name: '香港'
    <<: [*group_common_select, *HK_filter]
    include-all: true
    proxies: ['香港-自动选择', '香港-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'
  - name: '香港-自动选择'
    <<: [*group_common_auto, *HK_filter]
  - name: '香港-负载均衡'
    <<: [*group_common_load, *HK_filter]

  - name: '日本'
    <<: [*group_common_select, *JP_filter]
    include-all: true
    proxies: ['日本-自动选择', '日本-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png'
  - name: '日本-自动选择'
    <<: [*group_common_auto, *JP_filter]
  - name: '日本-负载均衡'
    <<: [*group_common_load, *JP_filter]

  - name: '美国'
    <<: [*group_common_select, *US_filter]
    include-all: true
    proxies: ['美国-自动选择', '美国-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'
  - name: '美国-自动选择'
    <<: [*group_common_auto, *US_filter]
  - name: '美国-负载均衡'
    <<: [*group_common_load, *US_filter]

  - name: '新加坡'
    <<: [*group_common_select, *SG_filter]
    include-all: true
    proxies: ['新加坡-自动选择', '新加坡-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'
  - name: '新加坡-自动选择'
    <<: [*group_common_auto, *SG_filter]
  - name: '新加坡-负载均衡'
    <<: [*group_common_load, *SG_filter]

  - name: '台湾省'
    <<: [*group_common_select, *TW_filter]
    include-all: true
    proxies: ['台湾省-自动选择', '台湾省-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png'
  - name: '台湾省-自动选择'
    <<: [*group_common_auto, *TW_filter]
  - name: '台湾省-负载均衡'
    <<: [*group_common_load, *TW_filter]

  - name: '其他节点'
    <<: [*group_common_select, *exclude_filter]
    include-all: true
    proxies: ['其他节点-自动选择', '其他节点-负载均衡']
    icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/World_Map.png'
  - name: '其他节点-自动选择'
    <<: [*group_common_auto, *exclude_filter]
  - name: '其他节点-负载均衡'
    <<: [*group_common_load, *exclude_filter]

# --- 路由规则 (保留原规则功能) ---

rules:
  # 局域网直连
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve

  # 代理分流
  - RULE-SET,Telegram,📲 电报消息
  - RULE-SET,Apple,🎯 全球直连
  - DOMAIN-SUFFIX,linux.do,🐧 Linux.do

  # 国内直连
  - GEOSITE,CN,🎯 全球直连
  - RULE-SET,AllProxy,🚀 节点选择
  - GEOIP,CN,🎯 全球直连

  # 兜底
  - MATCH,🚀 节点选择
